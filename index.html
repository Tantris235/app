<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Globalna Pogoda</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>🌍 Globalna Pogoda</h1>
      <p>Kliknij na mapie dowolne miejsce na świecie, aby sprawdzić aktualną pogodę.</p>
    </header>

    <main class="layout">
      <section id="map" aria-label="Mapa świata"></section>

      <aside class="panel" aria-live="polite">
        <h2>Warunki lokalne</h2>
        <p class="hint">Wybierz punkt na mapie.</p>
        <div id="weatherCard" class="weather-card hidden">
          <p><strong>Szerokość:</strong> <span id="lat"></span></p>
          <p><strong>Długość:</strong> <span id="lon"></span></p>
          <p><strong>Temperatura:</strong> <span id="temp"></span> °C</p>
          <p><strong>Odczuwalna:</strong> <span id="apparentTemp"></span> °C</p>
          <p><strong>Wiatr:</strong> <span id="wind"></span> km/h</p>
          <p><strong>Zachmurzenie:</strong> <span id="cloud"></span> %</p>
          <p><strong>Czas pomiaru:</strong> <span id="time"></span></p>
        </div>
        <p id="error" class="error hidden"></p>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
