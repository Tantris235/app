<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Firebase Live Chat</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px;
    text-align: center;
    background: #1e293b;
    font-weight: bold;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg {
    background: #334155;
    padding: 10px;
    border-radius: 12px;
    max-width: 70%;
  }

  .nick {
    font-size: 12px;
    color: #38bdf8;
    font-weight: bold;
    margin-bottom: 4px;
  }

  form {
    display: flex;
    gap: 8px;
    padding: 10px;
    background: #1e293b;
  }

  input {
    border: none;
    outline: none;
    padding: 10px;
    border-radius: 8px;
    background: #0f172a;
    color: white;
  }

  #nick { width: 140px; }
  #message { flex: 1; }

  button {
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    background: #22c55e;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #16a34a;
  }
</style>

<!-- Firebase COMPAT SDK (IMPORTANT for GitHub Pages) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<header>💬 Live Firebase Chat</header>

<div id="chat"></div>

<form id="form">
  <input id="nick" placeholder="Nick" value="Gracz" maxlength="20"/>
  <input id="message" placeholder="Message..." autocomplete="off"/>
  <button type="submit">Send</button>
</form>

<script>
// ================= FIREBASE CONFIG =================
const firebaseConfig = {
  apiKey: "AIzaSyAXURPcLmlpsr1VAfdyO94UIwSYWUUgEU4",
  authDomain: "chat-369c9.firebaseapp.com",
  databaseURL: "https://chat-369c9-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "chat-369c9",
  storageBucket: "chat-369c9.firebasestorage.app",
  messagingSenderId: "600143131631",
  appId: "1:600143131631:web:b5fd73a540ec93fabf7c1a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const chatRef = db.ref("chat");

// ================= UI =================
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const nickInput = document.getElementById("nick");
const msgInput = document.getElementById("message");

function scrollDown() {
  chat.scrollTop = chat.scrollHeight;
}

function addMessage(nick, text) {
  const msg = document.createElement("div");
  msg.className = "msg";

  const n = document.createElement("div");
  n.className = "nick";
  n.textContent = nick || "Gracz";

  const t = document.createElement("div");
  t.textContent = text;

  msg.appendChild(n);
  msg.appendChild(t);

  chat.appendChild(msg);
  scrollDown();
}

// ================= REALTIME LISTENER =================
chatRef.on("child_added", (snap) => {
  const data = snap.val();
  addMessage(data.nick, data.text);
});

// ================= SEND MESSAGE =================
form.addEventListener("submit", (e) => {
  e.preventDefault();

  const nick = nickInput.value.trim() || "Gracz";
  const text = msgInput.value.trim();
  if (!text) return;

  chatRef.push({
    nick,
    text,
    time: Date.now()
  });

  msgInput.value = "";
  scrollDown();
});

// ENTER SUPPORT
msgInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    form.requestSubmit();
  }
});
</script>

</body>
</html>
